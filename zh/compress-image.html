    <link rel="stylesheet" href="../styles.css" /></head><body><header class="topbar"><a class="brand" href="./"><img class="brand-icon" src="../site-icon.svg" alt="" aria-hidden="true" /><span>FitMyPic</span></a><nav><a href="./#tool">工具</a><a href="./image-resizer.html">尺寸调整</a><a href="./terms.html">条款</a></nav></header><main class="page"><p class="eyebrow">压缩教程</p><h1>在线压缩图片</h1><section><h2>图片为什么会变小</h2><p>文件大小受像素尺寸、图片格式和质量影响。降低宽高通常最有效，降低 JPG 或 WebP 质量也可以进一步减少体积。</p></section><section><h2>格式怎么选</h2><ul><li>JPG 适合照片。</li><li>PNG 适合透明图、截图和图标。</li><li>WebP 适合网页展示，通常体积更小。</li></ul></section><section><h2>质量建议</h2><p>JPG 和 WebP 可以从 80% 左右开始。如果图片仍然清晰，可以降到 70%；如果文字和边缘变糊，可以提高质量。</p><p><a href="./#tool">打开图片压缩工具</a></p></section></main><script src="../translate.js"></script></body></html>
