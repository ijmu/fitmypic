    <link rel="stylesheet" href="../styles.css" /></head><body><header class="topbar"><a class="brand" href="./"><img class="brand-icon" src="../site-icon.svg" alt="" aria-hidden="true" /><span>FitMyPic</span></a><nav><a href="./#tool">工具</a><a href="./compress-image.html">压缩</a><a href="./about.html">关于</a><a href="./privacy.html">隐私</a></nav></header><main class="page"><p class="eyebrow">尺寸调整教程</p><h1>如何在线调整图片尺寸</h1><section><h2>什么是图片尺寸调整</h2><p>调整尺寸就是改变图片的像素宽度和高度。例如把 4000 x 3000 的照片改成 1200 x 900，或把图片改成 1080 x 1080 的方图。</p></section><section><h2>尽量保持比例</h2><p>保持比例可以避免人物、产品和 Logo 被拉伸。只改宽度时，高度会自动按比例更新。</p></section><section><h2>推荐流程</h2><ol><li>上传 JPG、PNG 或 WebP 图片。</li><li>输入目标宽度或选择预设。</li><li>保持比例，除非你需要精确变形尺寸。</li><li>选择输出格式并下载。</li></ol><p><a href="./#tool">打开图片尺寸工具</a></p></section></main><script src="../translate.js"></script></body></html>
